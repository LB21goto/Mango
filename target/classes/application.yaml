#服务端口
server:
  port: 6086
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
# 应用名称
spring:
  logging:
    level:
      root: INFO
      org.springframework.ai: DEBUG
      reactor.netty.http.client: DEBUG
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: sk-9c119c8195ce449a816469e61dee350d
      chat:
        options:
          model: deepseek.chat
    dashscope:
      api-key: sk-5cfbfacf36d74191a7a4ea8b99664907
    mcp:
      client:
        enabled: true
        type: SYNC
        streamable-http:
          connections:
            aliyun-websearch:
              url: https://dashscope.aliyuncs.com/api/v1/mcps/WebSearch/mcp
              headers:
                Authorization: Bearer sk-5cfbfacf36d74191a7a4ea8b99664907
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: mariadb

  profiles:
    active: local
  application:
    name: ${prefix.distinction.name:damai}-program-service
  main:
    allow-bean-definition-overriding: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1
    jackson:
      time-zone: GMT+8
      date-format: yyyy-MM-dd HH:mm:ss
      generator:
        WRITE_NUMBERS_AS_STRINGS: true
  datasource:
    url: jdbc:mysql://localhost:3306/demotest01?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 60000
      connection-timeout: 30000
  data:
    redis:
      database: 1
      host: 192.168.100.128
      port: 6379
      timeout: 3000
      jedis:
        pool:
          max-active: 300
      stream:
        streamName: invalid_program
        consumerType: broadcast
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
        username: nacos
        password: nacos
      eager: true
  kafka:
    bootstrap-servers: 192.168.100.128:9092
    producer:
      enabled: false
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topic: create_order
rocketmq:
  name-server: 192.168.100.128:9876
  producer:
    group: create_order_group
  topic: create_order

bloom-filter:
  name: program-detail-bloom-filter
  expectedInsertions: 1000
  falseProbability: 0.01
